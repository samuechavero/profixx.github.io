kind = "web"
previewPath = "/"
title = "PROFIXX - Landing Page"
version = "1.0.0"
id = "artifacts/profixx-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19258

[services.development]
run = "pnpm --filter @workspace/profixx-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/profixx-landing", "run", "build" ]
publicDir = "artifacts/profixx-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19258"
BASE_PATH = "/"
